<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sem conexão — Priva</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px; text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f2f3f7; color: #0f0f14;
      }
      img { width: 72px; height: 72px; margin-bottom: 20px; }
      h1 { font-size: 20px; font-weight: 800; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.6; color: #5a5a68; max-width: 320px; margin: 0 0 24px; }
      button {
        border: 0; border-radius: 14px; padding: 14px 28px; font-size: 15px; font-weight: 700; color: #fff;
        background: linear-gradient(135deg, #4f46e5, #6366f1); cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img src="/icon-192.png" alt="Priva" />
    <h1>Você está sem conexão</h1>
    <p>Não conseguimos carregar a Priva agora. Verifique sua internet e tente novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </body>
</html>
